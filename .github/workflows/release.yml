name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Bump version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure git
        run: |
          git config user.name "mousty00"
          git config user.email "mousty00@users.noreply.github.com"
          git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Bump version
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit & tag
        run: |
          git add package.json
          git commit -m "chore: release ${{ steps.version.outputs.version }} [skip ci]"
          git tag ${{ steps.version.outputs.version }}
          git push origin main --follow-tags
